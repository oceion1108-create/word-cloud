(function() {

  dots.forEach(dot => {

})();

(function() {
  const track = document.getElementById('carouselTrack');
  if (!track) return;
  const slides = track.querySelectorAll('.carousel-slide');
  const dotsContainer = document.getElementById('carouselDots');
  const prevBtn = document.getElementById('carouselPrev');
  const nextBtn = document.getElementById('carouselNext');
  let current = 0;

  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  function goTo(index) {
    current = index;
    track.style.transform = 'translateX(-' + (current * 100) + '%)';
    dotsContainer.querySelectorAll('.carousel-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  prevBtn.addEventListener('click', () => {
    current = (current - 1 + slides.length) % slides.length;
    goTo(current);
  });
  nextBtn.addEventListener('click', () => {
    current = (current + 1) % slides.length;
    goTo(current);
  });
})();

(function() {
  const area = document.getElementById('dragArea');
  const checkBtn = document.getElementById('dragCheckBtn');
  const feedback = document.getElementById('dragFeedback');
  if (!area) return;

  let dragSrc = null;

  area.querySelectorAll('.drag-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrc = card;
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (dragSrc && dragSrc !== card) {
        const children = Array.from(area.children);
        const srcIdx = children.indexOf(dragSrc);
        const tgtIdx = children.indexOf(card);
        if (srcIdx < tgtIdx) {
          area.insertBefore(dragSrc, card.nextSibling);
        } else {
          area.insertBefore(dragSrc, card);
        }
        updateOrders();
      }
    });
    card.addEventListener('dragend', () => {
      area.querySelectorAll('.drag-card').forEach(c => c.classList.remove('drag-over'));
    });
  });

  function updateOrders() {
    area.querySelectorAll('.drag-card').forEach((card, i) => {
      card.querySelector('.drag-order').textContent = i + 1;
    });
  }

  checkBtn.addEventListener('click', () => {
    const cards = area.querySelectorAll('.drag-card');
    const correctOrder = ['3', '1', '2', '4'];
    let allCorrect = true;
    cards.forEach((card, i) => {
      card.classList.remove('drag-correct', 'drag-wrong');
      if (card.dataset.answer === correctOrder[i]) {
        card.classList.add('drag-correct');
      } else {
        card.classList.add('drag-wrong');
        allCorrect = false;
      }
    });
    feedback.textContent = allCorrect
      ? '??жҶӯиҠЈ?йҲӯпү–??о©”оҰҖй–¬иҠёи‘Ұ?пҺ…??ВҖ?пҡҡ??п„’пғ—?пҺҠ?ж‘Ёоҗ»?'
      : '?о—„ ж’ұз®„йҷҚ?пүҢ?еҡ—о«ӯ??иҠ°??иіў? ?вҲҹој…иқҜвҲ еҖҸиқӘиіў? ?пј¶?з’Ҷеүӣ?з”Ү?????ојј???;
    feedback.style.color = allCorrect ? 'var(--success)' : '#ffb74d';
  });
})();

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const COLLECTION = 'wordcloud_words';
const COLORS  = ['#4fc3f7','#e8643a','#ffb74d','#81c784','#ce93d8','#80deea','#f48fb1'];
let wcData = [];

function renderWC() {
  const listEl = document.getElementById('wc-list');
  const total = wcData.reduce((s, [,c]) => s + c, 0);
  document.getElementById('wc-total').textContent = total;
  document.getElementById('wc-unique').textContent = wcData.length;
  listEl.innerHTML = wcData.slice(0, 12).map(([w, c]) =>
    `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.06);">
      <span>${w}</span><span style="color:var(--accent);font-weight:700;">${c}</span>
    </div>`
  ).join('') || '<div style="color:#555;padding:8px 0;">ж’ о«ІпғҺйһҲпӢӘ?</div>';
  document.getElementById('wc-empty').style.display = wcData.length > 0 ? 'none' : '';
  const canvas = document.getElementById('wc-canvas');
  if (!canvas || typeof WordCloud === 'undefined') return;
  const rect = canvas.getBoundingClientRect();
  if (rect.width < 10 || rect.height < 10) return;
  canvas.width = rect.width;
  canvas.height = rect.height;
  if (wcData.length === 0) return;
  const maxCount = wcData[0][1];
  WordCloud(canvas, {
    list: wcData.map(([w, c]) => [w, Math.max(18, Math.round((c / maxCount) * 76))]),
    gridSize: 6, weightFactor: 1,
    fontFamily: '"Microsoft JhengHei", "Noto Sans TC", sans-serif',
    color: () => COLORS[Math.floor(Math.random() * COLORS.length)],
    backgroundColor: 'transparent', rotateRatio: 0.3, shuffle: true,
  });
}

function processWords(docs) {
  const freq = {};
  docs.forEach(doc => {
    const word = (doc.data().word || '').trim();
    if (word) freq[word] = (freq[word] || 0) + 1;
  });
  wcData = Object.entries(freq).sort((a, b) => b[1] - a[1]);
  renderWC();
}

async function submitWord(word) {
  try {
    await db.collection(COLLECTION).add({
      word,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) {
    console.error('Firestore submit error:', e);
  }
}

window.wcSubmit = function() {
  const input = document.getElementById('wc-input');
  const word = input.value.trim();
  if (!word) return;
  input.value = '';
  submitWord(word);
};

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('wc-input')?.addEventListener('keypress', e => {
    if (e.key === 'Enter') window.wcSubmit();
  });
  document.getElementById('wc-btn')?.addEventListener('click', window.wcSubmit);

  const qrEl = document.getElementById('qrcode');
  if (window.location.protocol === 'file:') {
    qrEl.innerHTML = '<div style="font-size:0.7em;color:#888;text-align:center;line-height:1.5;">?оҷұ<br>?еҮҪи”Ўж•ә?br>?иҠё??оёғоң…</div>';
    document.getElementById('qr-hint').textContent = '?еҮҪи”Ў??GitHub Pages ж•әп—әпҷҘ?иҲҖ???;
  } else if (typeof QRCode !== 'undefined') {
    var submitUrl = window.location.origin + window.location.pathname.replace(/index\.html$/, '') + 'submit.html';
    new QRCode(qrEl, { text: submitUrl, width: 140, height: 140, colorDark: '#0d1117', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
  }

  db.collection(COLLECTION).onSnapshot(snapshot => {
    processWords(snapshot.docs);
  }, error => {
    console.error('Firestore error:', error);
  });

  Reveal.on('slidechanged', e => {
    if (e.currentSlide?.id === 'slide-wordcloud') setTimeout(renderWC, 150);
  });
});
